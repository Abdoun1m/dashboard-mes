limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;
    client_max_body_size 1m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), display-capture=(), accelerometer=(), gyroscope=(), magnetometer=(), fullscreen=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" always;

    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    if ($request_method = OPTIONS) {
        add_header Allow "GET, HEAD, OPTIONS" always;
        add_header Content-Length 0 always;
        return 204;
    }

    location ~* ^/(?:\.env|\.git(?:/|$)|wp-admin(?:/|$)|wp-login\.php$|phpmyadmin(?:/|$)|admin(?:/|$)|server-status$) {
        return 404;
    }

    # Proxy API calls to Node-RED
    # IMPORTANT:
    # No trailing slash after :1880, otherwise /api/... becomes /...
    location /api/ {
        allow 192.168.20.0/24;
        deny all;

        limit_req zone=api_per_ip burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://192.168.20.10:1880;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Static asset caching
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), display-capture=(), accelerometer=(), gyroscope=(), magnetometer=(), fullscreen=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" always;
    }

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
